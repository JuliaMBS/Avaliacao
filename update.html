<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Atualizar Cadastro</title>
  <link rel="stylesheet" href="css/update.css"/>
</head>
<body>

  <div class="card" id="card-form">
    <h1>Atualizar Cadastro</h1>

    <form id="form" novalidate>

      <input type="hidden" id="id" name="id">

      <div class="campo" id="campo-nome">
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome"/>
        <span class="erro" id="erro-nome"></span>
      </div>

      <div class="campo" id="campo-email">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email"/>
        <span class="erro" id="erro-email"></span>
      </div>

      <div class="campo" id="campo-senha">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" placeholder="Deixe em branco para não alterar"/>
        <span class="erro" id="erro-senha"></span>
      </div>

      <div class="campo" id="campo-mensagem">
        <label for="mensagem">
          Mensagem <small id="contador">0/250</small>
        </label>
        <textarea id="mensagem" name="mensagem" maxlength="250"></textarea>
        <span class="erro" id="erro-mensagem"></span>
      </div>

      <button type="submit">Atualizar</button>
    </form>
  </div>

  <div class="card" id="card-sucesso" style="display:none">
    <p class="ok">✅ Atualizado com sucesso!</p>

    <div class="resultado">
      <p><strong>Nome:</strong> <span id="res-nome"></span></p>
      <p><strong>E-mail:</strong> <span id="res-email"></span></p>
      <p><strong>Mensagem:</strong> <span id="res-mensagem"></span></p>
    </div>

    <button id="btn-voltar">Voltar</button>
  </div>

  <script src="js/update.js"></script>
</body>
</html>
