<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deletar Usuário</title>
 <link rel="stylesheet" href="css/delete.css">
</head>
<body>
  <div class="wrap">

    <div class="card" id="main-form">
      <p class="page-title">Deletar usuário</p>
      <p class="page-sub">Escolha uma forma de identificar o usuário a ser removido.</p>

      <div class="tabs">
        <button class="tab active" onclick="setTab('email', this)">Por e-mail</button>
        <button class="tab" onclick="setTab('id', this)">Por ID</button>
      </div>

      <div id="tab-email">
        <div class="field">
          <label for="inp-email">E-mail</label>
          <input type="email" id="inp-email" placeholder="usuario@email.com" />
        </div>
      </div>

      <div id="tab-id" style="display:none">
        <div class="field">
          <label for="inp-id">ID do usuário</label>
          <input type="number" id="inp-id" placeholder="Ex: 42" min="1" />
        </div>
      </div>

      <button class="btn-delete" onclick="pedirConfirmacao()">Deletar usuário</button>
      <div class="feedback" id="feedback"></div>
    </div>

    <div class="confirm-overlay" id="confirm-overlay">
      <div class="confirm-box">
        <p id="confirm-msg">Tem certeza que deseja deletar este usuário? Esta ação não pode ser desfeita.</p>
        <div class="confirm-actions">
          <button class="btn-cancel" onclick="fecharConfirm()">Cancelar</button>
          <button class="btn-confirm" onclick="executarDelete()">Sim, deletar</button>
        </div>
      </div>
    </div>

  </div>

  <script src="js/delete.js"></script>
</body>
</html>
