<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro</title>
  <link rel="stylesheet" href="css/index.css"/>
</head>
<body>

  <div class="card" id="card-form">
    <h1>Cadastro</h1>

    <form id="form" novalidate>

      <div class="campo">
        <label for="nome">Nome</label>
        <input type="text" id="nome" placeholder="Ex: João Silva"/>
        <span class="erro" id="erro-nome"></span>
      </div>

      <div class="campo">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="joao@email.com"/>
        <span class="erro" id="erro-email"></span>
      </div>

      <div class="campo">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Mínimo 6 caracteres"/>
        <span class="erro" id="erro-senha"></span>
      </div>

      <div class="campo">
        <label for="mensagem">Mensagem <small id="contador">0/250</small></label>
        <textarea id="mensagem" maxlength="250" placeholder="Escreva aqui..."></textarea>
        <span class="erro" id="erro-mensagem"></span>
      </div>

      <button type="submit">Cadastrar</button>
    </form>
  </div>

  <!-- Sucesso -->
  <div class="card" id="card-sucesso" style="display:none">
    <p class="ok">✅ Cadastro realizado com sucesso!</p>
    <div class="resultado">
      <p><strong>Nome:</strong> <span id="res-nome"></span></p>
      <p><strong>E-mail:</strong> <span id="res-email"></span></p>
      <p><strong>Mensagem:</strong> <span id="res-mensagem"></span></p>
    </div>
    <button id="btn-novo">+ Novo cadastro</button>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
